<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record Management</title>
    <meta name="description" content="Manage student records cleanly and efficiently.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Student Record Management</h1>
            <div id="notification" class="notification hidden"></div>
        </header>

        <main>
            <section class="card form-section">
                <h2 id="form-title">Add Student</h2>
                <form id="student-form">
                    <input type="hidden" id="edit-id">
                    
                    <div class="form-group">
                        <label for="name">Student Name</label>
                        <input type="text" id="name" placeholder="Enter student name">
                        <span class="error-msg" id="name-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="studentId">Student ID</label>
                        <input type="text" id="studentId" placeholder="Enter student ID">
                        <span class="error-msg" id="studentId-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="text" id="phone" placeholder="Enter phone number">
                        <span class="error-msg" id="phone-error"></span>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="submit-btn" class="btn primary-btn">Add Student</button>
                        <button type="button" id="reset-btn" class="btn secondary-btn">Reset</button>
                    </div>
                </form>
            </section>

            <section class="card table-section">
                <h2>Student List</h2>
                <div class="table-responsive">
                    <table id="students-table">
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Student ID</th>
                                <th>Phone</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="students-tbody">
                            <!-- Data injected via JS -->
                        </tbody>
                    </table>
                </div>
                <div id="loading-state" class="state-message">
                    <div class="spinner"></div>
                    <p>Loading students...</p>
                </div>
                <div id="empty-state" class="state-message hidden">
                    <p>No students found. Add one to get started.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
